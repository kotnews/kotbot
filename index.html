<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<title>KOT Bot — Kenya X Content Generator</title>
<link rel="manifest" href="/kotbot/manifest.json" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --accent: #00e5a0;
    --accent2: #ff3d3d;
    --text: #f0f0f0;
    --muted: #555;
    --card: #161616;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); }

  .status-pill {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-pill .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: none;
  }

  .status-pill.live .dot {
    background: var(--accent);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  main {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  .hero {
    margin-bottom: 40px;
  }

  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 10px;
  }

  .hero h1 em {
    color: var(--accent);
    font-style: normal;
  }

  .hero p {
    color: var(--muted);
    font-size: 14px;
    font-family: 'DM Mono', monospace;
  }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 12px 24px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }

  .btn-primary:hover { background: #00ffb3; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Trends row */
  .trends-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 36px;
    min-height: 36px;
  }

  .trend-chip {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    animation: fadeIn 0.3s ease forwards;
    opacity: 0;
  }

  .trend-chip:hover, .trend-chip.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,160,0.05);
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* News cards */
  .news-grid {
    display: grid;
    gap: 16px;
    margin-bottom: 40px;
  }

  .news-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
    animation: slideUp 0.3s ease forwards;
    opacity: 0;
    transform: translateY(8px);
    position: relative;
    overflow: hidden;
  }

  .news-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--border);
    transition: background 0.2s;
  }

  .news-card:hover, .news-card.selected {
    border-color: #333;
    transform: translateY(-1px);
  }

  .news-card.selected::before { background: var(--accent); }

  @keyframes slideUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .card-source {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 8px;
  }

  .card-meta {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    gap: 12px;
  }

  .card-hot {
    color: var(--accent2);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Generated posts */
  .posts-section { margin-top: 8px; }

  .post-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 12px;
    position: relative;
    animation: slideUp 0.3s ease forwards;
    opacity: 0;
    transform: translateY(8px);
  }

  .post-variant-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .post-text {
    font-size: 14px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .post-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .char-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .char-count.over { color: var(--accent2); }

  .copy-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--accent); color: var(--accent); }

  /* Loader */
  .loader {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    gap: 16px;
  }

  .loader.show { display: flex; }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    line-height: 2;
  }

  .empty .icon { font-size: 32px; margin-bottom: 16px; }

  /* Generate button area */
  .generate-area {
    position: sticky;
    bottom: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    gap: 12px;
    align-items: center;
    z-index: 10;
  }

  .selected-info {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    flex: 1;
  }

  .selected-info strong { color: var(--accent); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 80px;
    right: 24px;
    background: var(--accent);
    color: #000;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px 18px;
    border-radius: 6px;
    font-weight: 500;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    z-index: 100;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  /* Error */
  .error-banner {
    background: rgba(255,61,61,0.1);
    border: 1px solid rgba(255,61,61,0.3);
    border-radius: 6px;
    padding: 12px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent2);
    margin-bottom: 16px;
    display: none;
  }

  .error-banner.show { display: block; }

  @media (max-width: 600px) {
    main { padding: 20px 16px 80px; }
    .generate-area { padding: 12px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">KOT<span>Bot</span></div>
  <div class="status-pill" id="statusPill">
    <div class="dot"></div>
    <span id="statusText">idle</span>
  </div>
</header>

<main>
  <div class="hero">
    <h1>Kenya X Content<br><em>Generator</em></h1>
    <p>// trending news → ready-to-post X content for #KOT</p>
  </div>

  <div class="controls">
    <button class="btn btn-primary" id="fetchBtn" onclick="fetchAll()">⚡ Fetch Hot Stories</button>
    <button class="btn btn-ghost" onclick="clearAll()">Clear</button>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div class="section-label">Google Trends Kenya</div>
  <div class="trends-row" id="trendsRow">
    <div class="empty" style="padding:0;font-size:12px">— fetch to load trends —</div>
  </div>

  <div class="section-label">Hot Stories</div>
  <div class="loader" id="newsLoader">
    <div class="spinner"></div>
    <div class="loader-text">scanning Kenyan feeds...</div>
  </div>
  <div class="news-grid" id="newsGrid">
    <div class="empty">
      <div class="icon">📡</div>
      Hit "Fetch Hot Stories" to pull breaking Kenyan news
    </div>
  </div>

  <div class="posts-section" id="postsSection" style="display:none">
    <div class="section-label">Generated Posts</div>
    <div class="loader" id="postsLoader">
      <div class="spinner"></div>
      <div class="loader-text">generating post variants...</div>
    </div>
    <div id="postsGrid"></div>
  </div>
</main>

<div class="generate-area">
  <div class="selected-info" id="selectedInfo">No story selected</div>
  <button class="btn btn-primary" id="generateBtn" onclick="generatePosts()" disabled>Generate Posts</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const RSS_SOURCES = [
  { name: 'Nation', url: 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://nation.africa/kenya/rss.xml') },
  { name: 'Standard', url: 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://www.standardmedia.co.ke/rss/headlines.php') },
  { name: 'Citizen', url: 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://www.citizen.digital/feed') },
  { name: 'KBC', url: 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://www.kbc.co.ke/feed/') },
  { name: 'The Star', url: 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://www.the-star.co.ke/rss/') },
];

const TRENDS_URL = 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://trends.google.com/trending/rss?geo=KE');

const HASHTAG_POOL = ['#KOT', '#KenyaPolitics', '#Kenya', '#NairobiLife', '#KenyaNews', '#Nairobi', '#KenyaTwitter'];

// ── STATE ───────────────────────────────────────────────────────────────────
let allStories = [];
let selectedStory = null;
let trends = [];

// ── UI HELPERS ───────────────────────────────────────────────────────────────
function setStatus(text, live = false) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusPill').className = 'status-pill' + (live ? ' live' : '');
}

function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 5000);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function setFetchLoading(on) {
  document.getElementById('newsLoader').className = 'loader' + (on ? ' show' : '');
  document.getElementById('fetchBtn').disabled = on;
  setStatus(on ? 'fetching...' : 'ready', on);
}

function setPostsLoading(on) {
  document.getElementById('postsLoader').className = 'loader' + (on ? ' show' : '');
  document.getElementById('generateBtn').disabled = on || !selectedStory;
}

// ── FETCH & PARSE ────────────────────────────────────────────────────────────
async function fetchRSS(source) {
  try {
    const res = await fetch(source.url);
    const json = await res.json();
    const parser = new DOMParser();
    const xml = parser.parseFromString(json.contents, 'text/xml');
    const items = [...xml.querySelectorAll('item')].slice(0, 5);
    return items.map(item => ({
      title: item.querySelector('title')?.textContent?.trim() || '',
      link: item.querySelector('link')?.textContent?.trim() || '',
      pubDate: item.querySelector('pubDate')?.textContent?.trim() || '',
      description: item.querySelector('description')?.textContent?.replace(/<[^>]+>/g, '').trim() || '',
      source: source.name,
    })).filter(i => i.title.length > 10);
  } catch (e) {
    return [];
  }
}

async function fetchTrends() {
  try {
    const res = await fetch(TRENDS_URL);
    const json = await res.json();
    const parser = new DOMParser();
    const xml = parser.parseFromString(json.contents, 'text/xml');
    const items = [...xml.querySelectorAll('item')].slice(0, 12);
    return items.map(i => i.querySelector('title')?.textContent?.trim()).filter(Boolean);
  } catch (e) {
    return [];
  }
}

function scoreStory(story, trends) {
  const titleLower = story.title.toLowerCase();
  let score = 0;
  trends.forEach(t => {
    if (titleLower.includes(t.toLowerCase().substring(0, 6))) score += 3;
  });
  // recency bonus
  if (story.pubDate) {
    const age = Date.now() - new Date(story.pubDate).getTime();
    const hours = age / 3600000;
    if (hours < 1) score += 5;
    else if (hours < 3) score += 3;
    else if (hours < 6) score += 1;
  }
  return score;
}

async function fetchAll() {
  setFetchLoading(true);
  document.getElementById('newsGrid').innerHTML = '';
  document.getElementById('postsSection').style.display = 'none';
  selectedStory = null;
  updateSelectedInfo();

  // Fetch trends + all RSS in parallel
  const [trendData, ...rssResults] = await Promise.all([
    fetchTrends(),
    ...RSS_SOURCES.map(fetchRSS)
  ]);

  trends = trendData;
  renderTrends(trends);

  // Flatten, deduplicate by title, score
  const raw = rssResults.flat();
  const seen = new Set();
  allStories = raw
    .filter(s => { if (seen.has(s.title)) return false; seen.add(s.title); return true; })
    .map(s => ({ ...s, score: scoreStory(s, trends) }))
    .sort((a, b) => b.score - a.score)
    .slice(0, 15);

  setFetchLoading(false);
  renderStories(allStories);
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderTrends(trends) {
  const row = document.getElementById('trendsRow');
  if (!trends.length) {
    row.innerHTML = '<div style="font-family:DM Mono,monospace;font-size:12px;color:#555">— could not load trends —</div>';
    return;
  }
  row.innerHTML = trends.map((t, i) =>
    `<div class="trend-chip" style="animation-delay:${i * 40}ms" onclick="filterByTrend('${t.replace(/'/g,"\\'")}', this)">${t}</div>`
  ).join('');
}

function filterByTrend(trend, el) {
  document.querySelectorAll('.trend-chip').forEach(c => c.classList.remove('active'));
  el.classList.toggle('active');
  const active = el.classList.contains('active');
  if (!active) { renderStories(allStories); return; }
  const filtered = allStories.filter(s =>
    s.title.toLowerCase().includes(trend.toLowerCase().substring(0, 5))
  );
  renderStories(filtered.length ? filtered : allStories);
}

function renderStories(stories) {
  const grid = document.getElementById('newsGrid');
  if (!stories.length) {
    grid.innerHTML = '<div class="empty"><div class="icon">🔍</div>No stories matched. Try fetching again.</div>';
    return;
  }
  grid.innerHTML = stories.map((s, i) => `
    <div class="news-card" style="animation-delay:${i * 50}ms" onclick="selectStory(${i}, this)">
      <div class="card-source">${s.source} ${s.score > 3 ? '<span class="card-hot">🔥 TRENDING</span>' : ''}</div>
      <div class="card-title">${s.title}</div>
      <div class="card-meta">
        <span>${formatAge(s.pubDate)}</span>
        ${s.link ? `<a href="${s.link}" target="_blank" style="color:var(--muted);text-decoration:none;" onclick="event.stopPropagation()">↗ source</a>` : ''}
      </div>
    </div>
  `).join('');
}

function formatAge(dateStr) {
  if (!dateStr) return '';
  const age = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(age / 60000);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs/24)}d ago`;
}

function selectStory(index, el) {
  document.querySelectorAll('.news-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedStory = allStories[index];
  updateSelectedInfo();
}

function updateSelectedInfo() {
  const el = document.getElementById('selectedInfo');
  const btn = document.getElementById('generateBtn');
  if (selectedStory) {
    el.innerHTML = `Selected: <strong>${selectedStory.title.substring(0,50)}${selectedStory.title.length > 50 ? '...' : ''}</strong>`;
    btn.disabled = false;
  } else {
    el.textContent = 'No story selected';
    btn.disabled = true;
  }
}

// ── AI POST GENERATION ───────────────────────────────────────────────────────
async function generatePosts() {
  if (!selectedStory) return;
  document.getElementById('postsSection').style.display = 'block';
  setPostsLoading(true);
  document.getElementById('postsGrid').innerHTML = '';

  const hashtags = pickHashtags(selectedStory);

  const prompt = `You are a sharp Kenyan Twitter (X) content writer. Generate 3 distinct post variants about this news story for a Kenyan audience (#KOT).

Story: "${selectedStory.title}"
${selectedStory.description ? `Context: ${selectedStory.description.substring(0, 200)}` : ''}
Source: ${selectedStory.source}
Suggested hashtags: ${hashtags}

Rules:
- Each post must be under 280 characters including hashtags
- Write in a natural, punchy Kenyan Twitter voice — witty, direct, conversational
- Vary the angle: one factual/news, one opinionated/hot take, one question/engagement
- Include 2-3 relevant hashtags from: ${HASHTAG_POOL.join(' ')}
- NO filler phrases, NO "Breaking:", NO emojis overload — max 1-2 per post
- Make Kenyans want to retweet or reply

Respond ONLY with a JSON array of 3 strings, no markdown, no explanation:
["post1 text", "post2 text", "post3 text"]`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const raw = data.content?.map(b => b.text || '').join('') || '';
    const clean = raw.replace(/```json|```/g, '').trim();
    const posts = JSON.parse(clean);

    setPostsLoading(false);
    renderPosts(posts);
  } catch (e) {
    setPostsLoading(false);
    showError('Post generation failed. Check your connection and try again.');
    console.error(e);
  }
}

function pickHashtags(story) {
  const title = story.title.toLowerCase();
  let tags = ['#KOT', '#Kenya'];
  if (title.includes('politic') || title.includes('parliament') || title.includes('ruto') || title.includes('raila') || title.includes('government')) {
    tags.push('#KenyaPolitics');
  }
  if (title.includes('nairobi')) tags.push('#Nairobi');
  return tags.join(' ');
}

function renderPosts(posts) {
  const labels = ['📰 Factual', '🔥 Hot Take', '💬 Engagement'];
  const grid = document.getElementById('postsGrid');
  grid.innerHTML = posts.map((post, i) => {
    const count = post.length;
    const over = count > 280;
    return `
      <div class="post-card" style="animation-delay:${i * 80}ms">
        <div class="post-variant-label">${labels[i] || `Variant ${i+1}`}</div>
        <div class="post-text" id="post${i}">${escapeHtml(post)}</div>
        <div class="post-footer">
          <span class="char-count ${over ? 'over' : ''}">${count}/280 chars${over ? ' ⚠ over limit' : ''}</span>
          <button class="copy-btn" onclick="copyPost(${i}, this)">Copy</button>
        </div>
      </div>
    `;
  }).join('');

  // Scroll to posts
  document.getElementById('postsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyPost(index, btn) {
  const text = document.getElementById(`post${index}`).textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    showToast('Post copied to clipboard');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function clearAll() {
  allStories = [];
  trends = [];
  selectedStory = null;
  document.getElementById('newsGrid').innerHTML = '<div class="empty"><div class="icon">📡</div>Hit "Fetch Hot Stories" to pull breaking Kenyan news</div>';
  document.getElementById('trendsRow').innerHTML = '<div class="empty" style="padding:0;font-size:12px">— fetch to load trends —</div>';
  document.getElementById('postsSection').style.display = 'none';
  document.getElementById('postsGrid').innerHTML = '';
  updateSelectedInfo();
  setStatus('idle');
}
  // Register service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/kotbot/sw.js');
  });
}
  
</script>
</body>
</html>
